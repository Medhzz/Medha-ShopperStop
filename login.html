<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – MedhaShopperStop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="brand">MedhaShopperStop</a>
  <div class="nav-links">
    <a href="login.html">Login</a>
    <a href="signup.html">Sign Up</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome Back</h2>
    <p class="auth-sub">Sign in to MedhaShopperStop</p>
    <div id="alert-area"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" id="btn-login">Sign In</button>
    </form>
    <br>
    <button class="btn-link" id="btn-reset">Forgot password?</button>
    <p class="auth-footer">No account? <a href="signup.html">Sign up</a></p>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script>
  // If already logged in, redirect
  auth.onAuthStateChanged(function(user) {
    if (user) {
      window.location.href = isAdmin(user) ? "admin.html" : "index.html";
    }
  });

  $("#login-form").on("submit", function(e) {
    e.preventDefault();
    const email = $("#email").val().trim();
    const password = $("#password").val();
    if (!email || !password) return showAlert("All fields required.");
    $("#btn-login").text("Signing in...").prop("disabled", true);
    signIn(email, password).then(function(cred) {
      window.location.href = isAdmin(cred.user) ? "admin.html" : "index.html";
    }).catch(function() {
      showAlert("Invalid email or password.");
      $("#btn-login").text("Sign In").prop("disabled", false);
    });
  });

  $("#btn-reset").on("click", function() {
    const email = $("#email").val().trim();
    if (!email) return showAlert("Enter your email first.");
    resetPwd(email).then(function() {
      showAlert("Password reset email sent!", "success");
    }).catch(function() {
      showAlert("Could not send reset email.");
    });
  });
</script>
</body>
</html>
