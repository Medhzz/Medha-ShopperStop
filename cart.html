<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart – MedhaShopperStop</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="brand">MedhaShopperStop</a>
  <div class="nav-links">
    <a href="index.html">Shop</a>
    <a href="cart.html" class="cart-wrap">Cart <span class="cart-badge" id="cart-badge" style="display:none">0</span></a>
    <a href="orders.html">My Orders</a>
    <a href="#" id="btn-logout">Logout</a>
  </div>
</nav>

<div class="page">
  <h2>Your Cart</h2>
  <div id="alert-area"></div>
  <div id="cart-items"></div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/app.js"></script>
<script>
  let currentUser = null, customerData = null;

  auth.onAuthStateChanged(function(user) {
    if (!user) { window.location.href = "login.html"; return; }
    if (isAdmin(user)) { window.location.href = "admin.html"; return; }
    currentUser = user;
    getCustomer(user.uid).then(function(c) { customerData = c; renderCart(); });
    updateNavBadge();
  });

  function renderCart() {
    const cart = getCart();
    if (!cart.length) {
      $("#cart-items").html('<p class="empty">Your cart is empty. <a href="index.html">Shop now &rarr;</a></p>');
      return;
    }
    const total = cartTotal();
    const creditAvail = ((customerData?.creditLimit || 1000) - (customerData?.creditUsed || 0));
    const itemsHtml = cart.map(i => `
      <div class="cart-item">
        <img src="${i.image_url}" alt="${i.title}" onerror="this.src='https://placehold.co/80x100/1a0010/ff69b4?text=D'" />
        <div class="cart-item-info">
          <h4>${i.title}</h4>
          <p>&#8377;${i.price.toFixed(2)} each</p>
        </div>
        <div class="qty-ctrl">
          <button class="qty-btn btn-minus" data-id="${i.productId}">&#8722;</button>
          <span class="qty-val">${i.quantity}</span>
          <button class="qty-btn btn-plus" data-id="${i.productId}">+</button>
        </div>
        <span class="cart-item-subtotal">&#8377;${(i.price * i.quantity).toFixed(2)}</span>
        <button class="btn btn-sm btn-danger btn-remove" data-id="${i.productId}">&#10005;</button>
      </div>`).join("");

    $("#cart-items").html(`
      ${itemsHtml}
      <div class="cart-summary">
        <div class="cart-total-row"><span>Total:</span><strong>&#8377;${total.toFixed(2)}</strong></div>
        <p style="font-size:0.85rem;color:rgba(255,255,255,0.55);margin-bottom:0.75rem">Payment Method:</p>
        <div class="radio-group">
          <label><input type="radio" name="payment" value="cash" checked /> Cash</label>
          <label><input type="radio" name="payment" value="credit" /> Credit</label>
        </div>
        <p class="credit-info" id="credit-info" style="display:none">Credit available: &#8377;${creditAvail.toFixed(2)}</p>
        <button class="btn btn-primary" id="btn-checkout" style="width:auto;min-width:180px">Place Order</button>
      </div>`);
  }

  $(document).on("change", "input[name=payment]", function() {
    $("#credit-info").toggle($(this).val() === "credit");
  });

  $(document).on("click", ".btn-plus", function() {
    const id = $(this).data("id");
    const item = getCart().find(i => i.productId === id);
    if (item) { updateCartQty(id, item.quantity + 1); renderCart(); }
  });

  $(document).on("click", ".btn-minus", function() {
    const id = $(this).data("id");
    const item = getCart().find(i => i.productId === id);
    if (item) { updateCartQty(id, item.quantity - 1); renderCart(); }
  });

  $(document).on("click", ".btn-remove", function() {
    removeFromCart($(this).data("id")); renderCart();
  });

  $(document).on("click", "#btn-checkout", function() {
    if (!currentUser || !customerData) return;
    const cart = getCart();
    if (!cart.length) return showAlert("Cart is empty.");
    const payment = $("input[name=payment]:checked").val();
    const total = cartTotal();
    const creditUsed = customerData.creditUsed || 0;
    const creditLimit = customerData.creditLimit || 1000;
    if (payment === "credit" && (creditUsed + total) > creditLimit) {
      return showAlert("Credit limit exceeded. Available: &#8377;" + (creditLimit - creditUsed).toFixed(2));
    }
    $("#btn-checkout").text("Placing order...").prop("disabled", true);
    // Check stock then place order
    getProducts().then(function(products) {
      for (const item of cart) {
        const p = products.find(x => x.id === item.productId);
        if (!p || p.quantity < item.quantity) {
          showAlert("Insufficient stock for: " + item.title);
          $("#btn-checkout").text("Place Order").prop("disabled", false);
          return;
        }
      }
      return placeOrder({
        uid: currentUser.uid,
        customerName: customerData.name,
        customerEmail: customerData.email,
        items: cart, total, paymentMethod: payment
      }).then(function() {
        // Deduct stock
        return Promise.all(cart.map(item => {
          const p = products.find(x => x.id === item.productId);
          return updateProduct(item.productId, { quantity: p.quantity - item.quantity });
        }));
      }).then(function() {
        if (payment === "credit") return updateCustomer(currentUser.uid, { creditUsed: creditUsed + total });
      }).then(function() {
        saveCart([]);
        window.location.href = "orders.html";
      });
    }).catch(function() {
      showAlert("Order failed. Please try again.");
      $("#btn-checkout").text("Place Order").prop("disabled", false);
    });
  });
</script>
</body>
</html>
